<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>Umma University | Register</title>
  <link rel='stylesheet' href='./register.css' />
</head>
<body>
  <main class='auth'>
    <section class='panel'>
      <div class='branding'>
        <img class='logo-img' src='../assets/umma-logo.jpg' alt='Umma University Logo' />
        <h1 id='portalTitle'>Student Portal</h1>
      </div>

      <form id='registerForm'>
        <label for='fullName'>Full Name</label>
        <input id='fullName' required />

        <label for='regEmail' id='identityLabel'>Email</label>
        <input id='regEmail' type='text' required />

        <label for='regPassword'>Password</label>
        <input id='regPassword' type='password' required />

        <button type='submit'>Register</button>
      </form>
      <p id='msg'></p>
      <p class='auth-switch'>Have an account? <a id='loginLink' href='./login.html'>Login</a></p>
    </section>
  </main>
  <script src='./register.js'></script>
</body>
</html>
