<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>Umma University | Login</title>
  <link rel='stylesheet' href='./login.css' />
</head>
<body>
  <main class='auth'>
    <section class='panel'>
      <div class='branding'>
        <img class='logo-img' src='../assets/umma-logo.jpg' alt='Umma University Logo' />
        <h1 id='portalTitle'>Student Portal</h1>
      </div>

      <form id='loginForm'>
        <label for='credential' id='credentialLabel'>Email / Username</label>
        <input id='credential' name='credential' required />

        <label for='password'>Password</label>
        <input id='password' name='password' type='password' required />

        <div class='remember-row'>
          <input type='checkbox' id='remember' name='remember' />
          <label for='remember'>Remember Me</label>
        </div>

        <button type='submit'>Login</button>
        <p id='error' class='error'></p>
      </form>

      <p class='auth-switch'>Forgot password? <a href='./forgot-password.html'>Reset here</a></p>
      <p class='auth-switch'>No account? <a id='registerLink' href='./register.html'>Register</a></p>
    </section>
  </main>
  <script src='./login.js'></script>
</body>
</html>
